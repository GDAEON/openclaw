services:
  openclaw-proxy-bridge:
    image: ginuerzh/gost:latest
    profiles:
      - proxy-bridge
    environment:
      PROXY_URL: ${PROXY_URL:-}
    command: ["-L=http://:8080", "-F=${PROXY_URL}"]
    init: true
    restart: unless-stopped

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      PROXY_URL: ${PROXY_URL:-}
      HTTP_PROXY: ${OPENCLAW_HTTP_PROXY:-${HTTP_PROXY:-}}
      HTTPS_PROXY: ${OPENCLAW_HTTPS_PROXY:-${HTTPS_PROXY:-}}
      ALL_PROXY: ${OPENCLAW_ALL_PROXY:-${ALL_PROXY:-}}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,openclaw-gateway}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - openclaw-proxy-bridge

  openclaw-cli:
    image: ${OPENCLAW_IMAGE}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      PROXY_URL: ${PROXY_URL:-}
      HTTP_PROXY: ${OPENCLAW_HTTP_PROXY:-${HTTP_PROXY:-}}
      HTTPS_PROXY: ${OPENCLAW_HTTPS_PROXY:-${HTTPS_PROXY:-}}
      ALL_PROXY: ${OPENCLAW_ALL_PROXY:-${ALL_PROXY:-}}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,openclaw-gateway}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-proxy-bridge
      - openclaw-gateway
